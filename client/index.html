<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PJC — Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-logo">
      <img class="login-logo-img" src="assets/logo.png" alt="Job Tracker" />
      <div>
        <span class="logo-mark">PJC</span>
        <span class="logo-sub">Job Tracker</span>
      </div>
    </div>
    <div class="auth-tabs" role="tablist" aria-label="Authentication">
      <button type="button" id="auth-login-tab" class="auth-tab active">Sign in</button>
      <button type="button" id="auth-register-tab" class="auth-tab">Create account</button>
    </div>
    <h1 id="auth-title" class="login-title">Sign in</h1>
    <p id="auth-subtitle" class="login-subtitle">Welcome back to your job search tracker.</p>
    <div id="login-error" class="alert alert-error hidden"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <div id="confirm-password-field" class="field hidden">
      <label>Confirm password</label>
      <input type="password" id="register-confirm-password" placeholder="Confirm password" autocomplete="new-password" />
    </div>
    <button type="button" id="login-btn" class="btn btn-primary btn-full">Sign in</button>
    <button type="button" id="auth-mode-toggle" class="auth-mode-toggle">New here? Create an account</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">PJC</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-page="applications">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Applications
      </a>
      <a href="#" class="nav-item" data-page="companies">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Companies
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-email" class="sidebar-user"></span>
      <button id="logout-btn" class="btn-logout">Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- DASHBOARD PAGE -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <h2>Dashboard</h2>
      </div>
      <div id="dashboard-content">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <!-- APPLICATIONS PAGE -->
    <div id="page-applications" class="page">
      <div class="page-header">
        <h2>Applications</h2>
        <button class="btn btn-primary" id="new-application-btn">+ New Application</button>
      </div>

      <!-- FILTERS -->
      <div class="filters-bar">
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="wishlist">Wishlist</option>
          <option value="applied">Applied</option>
          <option value="interview">Interview</option>
          <option value="test_task">Test Task</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
          <option value="ghosted">Ghosted</option>
        </select>
        <select id="filter-company">
          <option value="">All companies</option>
        </select>
        <button class="btn btn-secondary" id="apply-filters-btn">Filter</button>
      </div>

      <div id="applications-list">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <!-- COMPANIES PAGE -->
    <div id="page-companies" class="page">
      <div class="page-header">
        <h2>Companies</h2>
        <button class="btn btn-primary" id="new-company-btn">+ New Company</button>
      </div>
      <div id="companies-list">
        <div class="loading">Loading…</div>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- APPLICATION DETAIL PANEL -->
<div id="detail-panel" class="detail-panel hidden">
  <div class="detail-header">
    <button id="detail-close" class="detail-close">← Back</button>
    <h3 id="detail-title">Application</h3>
  </div>
  <div id="detail-body" class="detail-body"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
